version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: apex-store-intelligence:latest
    container_name: apex_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/apex_store.db
      - STORE_ID=brigade-road-bangalore
      - STORE_NAME=Purplle Brigade Road
      - DETECTOR_DEVICE=cpu
      - ENABLE_PROMETHEUS=true
      - LOG_LEVEL=INFO
    volumes:
      - apex_data:/app/data
      - ./CCTV Footage:/app/cctv:ro
      - .:/app/source:ro   # for hot-reload in dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - apex_net

  # ── Nginx (serves React dashboard + proxies API) ──────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: apex-dashboard:latest
    container_name: apex_dashboard
    ports:
      - "80:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - apex_net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: apex_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - apex_net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: apex_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=apex_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - apex_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  apex_data:
  prometheus_data:
  grafana_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  apex_net:
    driver: bridge
